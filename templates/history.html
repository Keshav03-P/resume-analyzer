
<!DOCTYPE html>
<html>
<head>
    <title>History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-4">

    <h2>History</h2>

    <table class="table table-bordered mt-3">
        <tr>
            <th>File</th>
            <th>Score</th>
            <th>Skills</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}%</td>
            <td>{{ row[3] }}</td>
        </tr>
        {% endfor %}
    </table>

    <a href="/" class="btn btn-primary">Back</a>

</div>

</body>
</html>
