<!DOCTYPE html>
<html>
<head>
    <title>Resume Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- ✅ Chart Size Fix -->
    <style>
        .chart-container {
            position: relative;
            height: 300px;
        }
    </style>
</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="d-flex justify-content-between mb-3">
        <h2>Resume Analyzer</h2>
        <div>
            <a href="/history" class="btn btn-outline-secondary">History</a>
            <a href="/logout" class="btn btn-danger">Logout</a>
        </div>
    </div>

    <!-- Upload Form -->
    <div class="card p-4 shadow mb-4">
        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="resume" class="form-control mb-3" required>

            <textarea name="jd" class="form-control mb-3" rows="5"
                placeholder="Paste Job Description here..."></textarea>

            <button class="btn btn-primary">Analyze Resume</button>
        </form>
    </div>

    {% if result %}
    <div class="card p-4 shadow">

        <h4>
            Match Score:
            <span class="badge bg-success">{{ result.match_score }}%</span>
        </h4>

        <!-- ✅ Charts Row -->
        <div class="row mt-4">

            <!-- Doughnut Chart -->
            <div class="col-md-6">
                <div class="chart-container">
                    <canvas id="scoreChart"></canvas>
                </div>
            </div>

            <!-- Bar Chart -->
            <div class="col-md-6">
                <div class="chart-container">
                    <canvas id="skillsChart"></canvas>
                </div>
            </div>

        </div>

        <hr>

        <h5>Matched Skills</h5>
        <ul class="list-group mb-3">
            {% for s in result.matched_skills %}
            <li class="list-group-item">{{ s }}</li>
            {% endfor %}
        </ul>

        <h5>Missing Skills</h5>
        <ul class="list-group">
            {% for s in result.suggestions %}
            <li class="list-group-item text-danger">{{ s }}</li>
            {% endfor %}
        </ul>

    </div>

    <!-- ✅ Charts Script -->
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            // Doughnut Chart
            new Chart(document.getElementById('scoreChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Matched', 'Missing'],
                    datasets: [{
                        data: {{ [result.match_score, 100 - result.match_score] | tojson }},
                        backgroundColor: ['green', 'red']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });

            // Bar Chart
            new Chart(document.getElementById('skillsChart'), {
                type: 'bar',
                data: {
                    labels: ['Matched Skills', 'Missing Skills'],
                    datasets: [{
                        label: 'Count',
                        data: {{ [result.matched_skills|length, result.suggestions|length] | tojson }},
                        backgroundColor: ['blue', 'orange']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });

        });
    </script>

    {% endif %}

</div>

</body>
</html>
